<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工银幸福云平台 - 管理者后台</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 模拟手机容器 */
        .phone-container {
            width: 390px;
            height: 844px;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 3rem;
            border: 8px solid #1f2937;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes ping-slow {
            0% { transform: scale(1); opacity: 1; }
            70%, 100% { transform: scale(2); opacity: 0; }
        }
        .animate-ping-slow {
            animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen py-10">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AdminDashboard = () => {
            // 初始化图标
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            return (
                <div className="phone-container">
                    <div className="h-full no-scrollbar p-6 pt-12 overflow-y-auto relative bg-white text-black">
                        
                        {/* 顶部导航栏 */}
                        <div className="flex justify-between items-center mb-8">
                            <button className="w-10 h-10 rounded-full bg-black/5 border border-black/10 flex items-center justify-center active:scale-90 transition-all">
                                <i data-lucide="arrow-left" className="w-4 h-4"></i>
                            </button>
                            <div className="text-right">
                                <h2 className="text-xl font-bold tracking-tight">工银幸福云平台</h2>
                                <p className="text-[9px] font-black tracking-[0.2em] text-[#E60012] uppercase">Happiness Cloud Platform</p>
                            </div>
                        </div>

                        {/* 数据看板区块 */}
                        <div className="space-y-6 mb-10">
                            <div className="flex items-center justify-between px-2">
                                <h3 className="text-sm font-bold flex items-center gap-2">
                                    <i data-lucide="layout" className="w-3.5 h-3.5 text-[#E60012]"></i>
                                    数据看板
                                </h3>
                                <span className="text-[10px] opacity-40 font-mono">LIVE MONITORING</span>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                {/* 在线人数卡片 */}
                                <div className="bg-black/[0.02] border border-black/[0.05] rounded-3xl p-5 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-3 opacity-20">
                                        <i data-lucide="users" className="w-4 h-4"></i>
                                    </div>
                                    <p className="text-[10px] text-black/40 mb-1">在线人数</p>
                                    <div className="flex items-end gap-2">
                                        <span className="text-2xl font-mono font-bold">1,284</span>
                                        <span className="text-[10px] text-[#E60012] mb-1 flex items-center gap-0.5">
                                            <i data-lucide="trending-up" className="w-2.5 h-2.5"></i> +12%
                                        </span>
                                    </div>
                                    {/* 简易趋势图模拟 */}
                                    <div className="mt-4 h-12 flex items-end gap-1">
                                        {[30, 50, 40, 70, 60, 90, 85].map((h, i) => (
                                            <div key={i} className="flex-1 bg-[#E60012]/20 rounded-t-sm" style={{height: `${h}%`}}></div>
                                        ))}
                                    </div>
                                </div>

                                {/* 职工情绪云图卡片 */}
                                <div className="bg-black/[0.02] border border-black/[0.05] rounded-3xl p-5 relative overflow-hidden">
                                    <p className="text-[10px] text-black/40 mb-1">职工情绪云图</p>
                                    <div className="h-24 flex items-center justify-center mt-2">
                                        <div className="w-16 h-16 rounded-full border-2 border-dashed border-[#E60012]/20 relative flex items-center justify-center">
                                            <div className="w-10 h-10 bg-[#E60012]/10 rounded-full flex items-center justify-center">
                                                <i data-lucide="heart" className="w-5 h-5 text-[#E60012]"></i>
                                            </div>
                                            {/* 模拟雷达图点 */}
                                            <div className="absolute top-0 left-1/2 w-1.5 h-1.5 bg-[#E60012] rounded-full -translate-x-1/2"></div>
                                            <div className="absolute bottom-2 right-0 w-1.5 h-1.5 bg-[#E60012] rounded-full"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 满意度趋势图 */}
                            <div className="bg-black/[0.02] border border-black/[0.05] rounded-3xl p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <p className="text-[10px] text-black/40 uppercase tracking-widest">职工满意度趋势图</p>
                                    <div className="flex gap-2">
                                        <div className="w-2 h-2 rounded-full bg-[#E60012]"></div>
                                        <div className="w-2 h-2 rounded-full bg-black/10"></div>
                                    </div>
                                </div>
                                <div className="h-32 flex items-end justify-between gap-2">
                                    {[65, 70, 85, 80, 92, 100].map((h, i) => (
                                        <div key={i} className="flex-1 rounded-t-lg transition-all hover:opacity-80 cursor-pointer" 
                                             style={{height: `${h}%`, backgroundColor: i === 5 ? '#E60012' : 'rgba(0,0,0,0.05)'}}>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between mt-3 text-[8px] text-black/30 font-bold tracking-tighter">
                                    <span>JAN</span><span>FEB</span><span>MAR</span><span>APR</span><span>MAY</span><span>JUN</span>
                                </div>
                            </div>

                            {/* 设备全景地图 */}
                            <div className="bg-black/[0.02] border border-black/[0.05] rounded-3xl p-6 relative overflow-hidden">
                                <div className="flex justify-between items-center mb-4">
                                    <p className="text-[10px] text-black/40 uppercase tracking-widest">设备全景地图</p>
                                    <i data-lucide="map" className="w-3.5 h-3.5 text-black/20"></i>
                                </div>
                                <div className="aspect-video bg-black/[0.02] rounded-2xl relative flex items-center justify-center border border-black/[0.05] overflow-hidden">
                                    <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, rgba(0,0,0,0.2) 1px, transparent 0)', backgroundSize: '20px 20px' }}></div>
                                    <div className="relative">
                                        <div className="w-32 h-20 border border-[#E60012]/30 rounded-lg flex items-center justify-center">
                                            <div className="w-2 h-2 bg-[#E60012] rounded-full animate-ping-slow"></div>
                                        </div>
                                        <div className="absolute -top-4 -left-4 w-1.5 h-1.5 bg-black/20 rounded-full"></div>
                                        <div className="absolute -bottom-2 -right-6 w-1.5 h-1.5 bg-black/20 rounded-full"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 功能卡片区块 */}
                        <div className="grid grid-cols-3 gap-3 mb-10">
                            <div className="bg-black/[0.02] border border-black/[0.05] rounded-[32px] p-4 flex flex-col items-center justify-center text-center gap-3 transition-all active:scale-95 cursor-pointer hover:bg-black/[0.05]">
                                <div className="w-10 h-10 rounded-full bg-[#E60012]/10 flex items-center justify-center text-[#E60012]">
                                    <i data-lucide="cpu" className="w-4.5 h-4.5"></i>
                                </div>
                                <span className="text-[10px] font-bold leading-tight">设备一键管理</span>
                            </div>
                            <div className="bg-black/[0.02] border border-black/[0.05] rounded-[32px] p-4 flex flex-col items-center justify-center text-center gap-3 transition-all active:scale-95 cursor-pointer hover:bg-black/[0.05]">
                                <div className="w-10 h-10 rounded-full bg-[#FF8BA7]/10 flex items-center justify-center text-[#FF8BA7]">
                                    <i data-lucide="calendar" className="w-4.5 h-4.5"></i>
                                </div>
                                <span className="text-[10px] font-bold leading-tight">活动发布</span>
                            </div>
                            <div className="bg-black/[0.02] border border-black/[0.05] rounded-[32px] p-4 flex flex-col items-center justify-center text-center gap-3 transition-all active:scale-95 cursor-pointer hover:bg-black/[0.05]">
                                <div className="w-10 h-10 rounded-full bg-[#89CFF0]/10 flex items-center justify-center text-[#89CFF0]">
                                    <i data-lucide="send" className="w-4.5 h-4.5"></i>
                                </div>
                                <span className="text-[10px] font-bold leading-tight">内容推送</span>
                            </div>
                        </div>

                        {/* 搜索框 / 报告生成 */}
                        <div className="relative mb-12">
                            <div className="absolute left-5 top-1/2 -translate-y-1/2 text-[#E60012]">
                                <i data-lucide="bar-chart-2" className="w-4.5 h-4.5"></i>
                            </div>
                            <input 
                                type="text" 
                                readOnly
                                placeholder="一键生成数据报告"
                                className="w-full h-16 pl-14 pr-6 rounded-full bg-black/[0.02] border border-black/[0.05] text-sm outline-none cursor-pointer hover:bg-black/[0.05] transition-all text-black/60"
                            />
                            <div className="absolute right-4 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-[#E60012] flex items-center justify-center shadow-lg">
                                <i data-lucide="plus" className="w-4 h-4 text-white"></i>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
