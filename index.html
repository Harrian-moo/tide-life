<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潮汐生活 App - 前卫艺术展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F0E6E8;
            transition: background-color 1s ease;
        }

        .font-serif {
            font-family: 'Noto Serif SC', serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* 极致圆角与平滑过渡 */
        .smooth-transition {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-pink { --brand: #FF8BA7; --bg: #FBF7F8; --container: #FAF9F6; --text: #111827; --border: #FCE7EB; --shadow: rgba(255, 139, 167, 0.1); }
        .theme-gray { --brand: #555555; --bg: #F2F2F2; --container: #FAF9F6; --text: #111827; --border: #EAEAEA; --shadow: rgba(0, 0, 0, 0.05); }
        .theme-green { --brand: #E2FF54; --bg: #1A1A1A; --container: #111111; --text: #FFFFFF; --border: #333333; --shadow: rgba(226, 255, 84, 0.2); }

        .app-container {
            background-color: var(--container);
            border-color: var(--container);
            color: var(--text);
        }

        .brand-bg { background-color: var(--brand); }
        .brand-text { color: var(--brand); }
        .theme-border { border-color: var(--border); }
        .theme-bg-soft { background-color: var(--bg); }

        /* 页面切换动画 */
        .page {
            display: none;
            height: 100%;
            overflow-y: auto;
        }
        .page.active {
            display: block;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4 theme-pink" id="bodyRoot">

    <!-- 手机外壳 -->
    <div class="w-[375px] h-[812px] rounded-[64px] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.25)] overflow-hidden border-[12px] border-white relative app-container smooth-transition" id="appShell">
        
        <!-- 灵动岛 -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-white rounded-b-3xl z-[60] transition-colors duration-700" id="island"></div>

        <!-- 首页 (Main Page) -->
        <div id="page-main" class="page active no-scrollbar pb-32 p-6 space-y-10">
            <!-- 页眉 -->
            <header class="flex justify-between items-start pt-10">
                <div class="text-left">
                    <h1 class="text-5xl font-serif italic font-medium leading-tight transition-colors duration-700 main-title-text">
                        潮能量 <br /> <span class="not-italic">生活馆</span>
                    </h1>
                    <p class="text-xs font-medium tracking-[0.2em] text-gray-400 mt-2 uppercase">
                        工银幸福生活家
                    </p>
                </div>
                
                <button onclick="toggleTheme()" class="w-12 h-12 bg-white border border-gray-100 rounded-full flex items-center justify-center shadow-sm shrink-0 active:scale-90 transition-all group overflow-hidden">
                    <div class="grid grid-cols-2 gap-0.5 group-hover:rotate-180 transition-transform duration-700">
                        <div class="w-1.5 h-1.5 rounded-full bg-[#FF8BA7]"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-[#E2FF54]"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-[#555555]"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
                    </div>
                </button>
            </header>

            <!-- IP 展示区 -->
            <div class="relative h-72 w-full group">
                <div class="absolute inset-0 rounded-[48px] overflow-hidden border theme-border theme-bg-soft smooth-transition ip-box-ref">
                    <div class="absolute inset-0 flex items-center justify-center p-4">
                        <img src="https://raw.githubusercontent.com/Harrian-moo/design-assets/main/images/ip/%E5%9B%BE%E7%89%87%E5%A4%84%E7%90%86%EF%BC%88%E6%8A%A0%E5%9B%BE%E5%8E%BB%E6%B0%B4%E5%8D%B0%EF%BC%89.png" 
                             alt="IP" 
                             class="w-full h-full object-contain scale-110 translate-y-2 transition-transform group-hover:scale-125 duration-1000">
                    </div>
                    <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end">
                        <div class="bg-white/70 backdrop-blur-md px-5 py-2.5 rounded-2xl flex items-center gap-3 border border-white/10 shadow-sm">
                            <div class="text-sm font-black italic tracking-tighter brand-text smooth-transition">HEART-LAB</div>
                            <div class="h-4 w-[1px] bg-gray-500/30"></div>
                            <span class="text-xs font-bold tracking-widest uppercase text-gray-600 ip-tag-ref">Soul Master</span>
                        </div>
                        <button class="w-14 h-14 rounded-full shadow-xl flex items-center justify-center border-4 border-white brand-bg smooth-transition plus-btn-ref">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-white plus-icon-ref"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 功能导航 -->
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div onclick="navigateTo('energy')" class="w-[45%] h-44 bg-white border border-gray-100 p-5 rounded-[42px] flex flex-col justify-between items-start transition-all active:scale-95 cursor-pointer theme-card">
                        <div class="w-11 h-11 bg-black/5 rounded-full flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></div>
                        <div class="text-left">
                            <p class="text-[9px] uppercase font-black tracking-[0.15em] opacity-40 mb-1.5">Energy</p>
                            <span class="text-base font-black tracking-tight">潮能补给</span>
                        </div>
                    </div>
                    <div onclick="navigateTo('healing')" class="w-[55%] h-44 brand-bg p-5 rounded-[42px] flex flex-col justify-between items-start transition-all active:scale-95 cursor-pointer text-white shadow-lg healing-card-ref">
                        <div class="w-11 h-11 bg-white/20 rounded-full flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></div>
                        <div class="text-left">
                            <p class="text-[9px] uppercase font-black tracking-[0.15em] opacity-60 mb-1.5">Healing</p>
                            <span class="text-base font-black tracking-tight">潮汐疗愈</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2 h-36 bg-white border border-gray-100 p-5 rounded-[42px] flex flex-col justify-between items-start transition-all active:scale-95 cursor-pointer theme-card">
                        <div class="w-11 h-11 bg-black/5 rounded-full flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg></div>
                        <span class="text-base font-black tracking-tight">潮趣生活</span>
                    </div>
                    <div class="w-1/2 h-36 bg-[#F5F5F0] p-5 rounded-[42px] flex flex-col justify-between items-start transition-all active:scale-95 cursor-pointer study-card-ref">
                        <div class="w-11 h-11 bg-black/5 rounded-full flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></div>
                        <span class="text-base font-black tracking-tight">潮学研习</span>
                    </div>
                </div>
            </div>

            <!-- 底部导航 -->
            <div class="fixed bottom-10 left-6 right-6 h-20 bg-black rounded-full flex items-center px-2 justify-between shadow-2xl z-50 transition-colors duration-700 bottom-nav-ref">
                <div class="flex items-center gap-3 ml-2">
                    <div class="w-12 h-12 bg-white rounded-full overflow-hidden border-2 shrink-0 brand-border smooth-transition avatar-box-ref" style="border-color: var(--brand);">
                        <img src="https://raw.githubusercontent.com/Harrian-moo/design-assets/main/images/ip/%E5%9B%BE%E7%89%87%E5%A4%84%E7%90%86%EF%BC%88%E6%8A%A0%E5%9B%BE%E5%8E%BB%E6%B0%B4%E5%8D%B0%EF%BC%89.png" class="w-full h-full object-cover scale-[1.8] translate-y-1">
                    </div>
                    <div class="text-left overflow-hidden">
                        <p class="text-white font-bold text-sm tracking-tight truncate">张小潮</p>
                        <p class="text-gray-500 text-[9px] uppercase tracking-[0.2em] truncate">Customer Manager</p>
                    </div>
                </div>
                <div class="flex gap-1.5 mr-2 shrink-0">
                    <button class="w-14 h-14 bg-[#1A1A1A] rounded-full flex items-center justify-center text-white nav-icon-btn-ref">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    </button>
                    <button class="px-5 h-14 rounded-full flex items-center justify-center font-black text-[10px] tracking-widest uppercase brand-bg text-white profile-btn-ref">
                        Profile
                    </button>
                </div>
            </div>
        </div>

        <!-- 详情页：潮能补给 (Energy Page) -->
        <div id="page-energy" class="page no-scrollbar p-8 pt-16">
            <button onclick="navigateTo('main')" class="mb-10 w-12 h-12 border rounded-full flex items-center justify-center active:scale-90 back-btn-ref">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h2 class="text-4xl font-serif italic mb-2 leading-tight">Energy <br/>Status</h2>
            <p class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-8">能量与身体监测</p>
            
            <div class="space-y-6">
                <div class="p-8 rounded-[48px] space-y-4 energy-metric-box">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Latest Metrics</p>
                    <div class="flex items-end gap-2">
                        <span class="text-6xl font-black italic metric-value">72</span>
                        <span class="text-xl font-serif text-gray-400 mb-2">bpm</span>
                    </div>
                    <p class="text-sm font-bold text-gray-400">静息心率 · 表现极佳</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 bg-black rounded-[40px] text-white h-44 flex flex-col justify-between border border-zinc-800">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E2FF54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">AI Mirror</p>
                            <p class="text-lg font-bold leading-tight text-[#E2FF54]">AI 健身镜</p>
                        </div>
                    </div>
                    <div class="p-6 rounded-[40px] h-44 flex flex-col justify-between border theme-bg-soft theme-border air-box-ref">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-text"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Air Quality</p>
                            <p class="text-lg font-bold leading-tight air-text-ref">空气管家</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 详情页：潮汐疗愈 (Healing Page) -->
        <div id="page-healing" class="page no-scrollbar p-8 pt-16">
            <button onclick="navigateTo('main')" class="mb-10 w-12 h-12 border rounded-full flex items-center justify-center active:scale-90 back-btn-ref">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h2 class="text-4xl font-serif italic mb-2 leading-tight">Mind <br/>Healing</h2>
            <p class="text-[10px] font-black tracking-[0.2em] brand-text uppercase mb-8">情绪气象站</p>
            
            <div class="space-y-6">
                <div class="p-10 rounded-[56px] shadow-sm text-center border healing-status-box">
                    <div class="text-7xl mb-6">💖</div>
                    <p class="text-4xl font-black italic">88</p>
                    <p class="text-sm font-bold text-gray-400 mt-2">今日心情指数：极佳</p>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1 p-6 rounded-[40px] flex items-center gap-4 border healing-card-detail">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0 healing-icon-bg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-text"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                        </div>
                        <div class="text-left">
                            <p class="text-sm font-bold">白噪音冥想</p>
                            <p class="text-[10px] text-gray-400 uppercase tracking-widest">15 Mins</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentThemeIndex = 0;
        const themes = ['pink', 'gray', 'green'];

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            // 切换页面时重置滚动位置
            document.getElementById('appShell').scrollTop = 0;
        }

        function toggleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            const body = document.getElementById('bodyRoot');
            const shell = document.getElementById('appShell');
            const island = document.getElementById('island');
            
            // 移除旧主题，添加新主题
            body.classList.remove('theme-pink', 'theme-gray', 'theme-green');
            body.classList.add(`theme-${theme}`);

            // 动态调整 DOM 样式以适配不同主题
            updateThemeStyles(theme);
        }

        function updateThemeStyles(theme) {
            const isGreen = theme === 'green';
            const shell = document.getElementById('appShell');
            const island = document.getElementById('island');
            
            // 基础结构配色
            shell.style.borderColor = isGreen ? '#222' : 'white';
            island.style.backgroundColor = isGreen ? '#222' : 'white';

            // 详情页特定样式适配
            document.querySelectorAll('.back-btn-ref').forEach(btn => {
                btn.className = `mb-10 w-12 h-12 border rounded-full flex items-center justify-center active:scale-90 float-left shadow-sm transition-colors ${isGreen ? 'bg-zinc-900 border-zinc-700 text-white' : 'bg-white border-gray-100 text-black'}`;
            });

            document.querySelectorAll('.energy-metric-box').forEach(box => {
                box.className = `p-8 rounded-[48px] space-y-4 ${isGreen ? 'bg-zinc-900' : 'bg-[#F5F5F0]'}`;
            });

            document.querySelectorAll('.metric-value').forEach(val => {
                val.className = `text-6xl font-black italic ${isGreen ? 'text-[#E2FF54]' : ''}`;
            });

            document.querySelectorAll('.healing-status-box').forEach(box => {
                box.className = `p-10 rounded-[56px] shadow-sm text-center border ${isGreen ? 'bg-zinc-900 border-zinc-800' : 'bg-white border-transparent'}`;
            });

            document.querySelectorAll('.healing-card-detail').forEach(card => {
                card.className = `flex-1 p-6 rounded-[40px] flex items-center gap-4 border ${isGreen ? 'bg-zinc-900 border-zinc-800' : 'bg-white border-transparent'}`;
            });

            // 首页特定样式
            const bottomNav = document.querySelector('.bottom-nav-ref');
            if(bottomNav) bottomNav.style.backgroundColor = isGreen ? '#27272a' : 'black';

            document.querySelectorAll('.theme-card').forEach(el => {
                el.style.backgroundColor = isGreen ? '#18181b' : 'white';
                el.style.borderColor = isGreen ? '#27272a' : '#f3f4f6';
                el.style.color = isGreen ? 'white' : 'black';
            });

            const studyCard = document.querySelector('.study-card-ref');
            if(studyCard) studyCard.style.backgroundColor = isGreen ? '#27272a' : '#F5F5F0';

            const profileBtn = document.querySelector('.profile-btn-ref');
            if(profileBtn) profileBtn.style.color = isGreen ? 'black' : 'white';

            const airText = document.querySelector('.air-text-ref');
            if(airText) airText.style.color = isGreen ? 'white' : 'black';
        }
    </script>
</body>
</html>
