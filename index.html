<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工银幸福云平台 - 全功能完整版</title>
    <!-- 核心依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --brand: #FF8BA7;
            --brand-soft: #FFF0F3;
            --body-bg: #FFF5F7;
        }

        .theme-pink { --brand: #FF8BA7; --brand-soft: #FFF0F3; --body-bg: #FFF5F7; }
        .theme-blue { --brand: #89CFF0; --brand-soft: #F0F8FF; --body-bg: #F5FAFF; }
        .theme-green { --brand: #E2FF54; --brand-soft: #F4FFB8; --body-bg: #000000; }
        .theme-yellow { --brand: #FFD700; --brand-soft: #FFFBE6; --body-bg: #FFFDF0; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            transition: background-color 0.5s ease;
        }

        .theme-bg { background-color: var(--body-bg); }
        .theme-bg-soft { background-color: var(--brand-soft); }
        .brand-bg { background-color: var(--brand); }
        .brand-text { color: var(--brand); }
        .theme-border { border-color: rgba(0,0,0,0.05); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .phone-shell {
            width: 400px;
            height: 860px;
            background: #000;
            border-radius: 60px;
            padding: 12px;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .screen {
            width: 100%;
            height: 100%;
            background: var(--body-bg);
            border-radius: 48px;
            overflow: hidden;
            position: relative;
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dynamic-island {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 32px;
            background: #000;
            border-radius: 20px;
            z-index: 100;
        }
    </style>
</head>
<body class="theme-pink">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;
        const { LineChart, Line, BarChart, Bar, RadarChart, Radar, PolarGrid, PolarAngleAxis, ResponsiveContainer, Cell, Tooltip, XAxis } = window.Recharts;

        const App = () => {
            const [theme, setTheme] = useState('pink');
            const [page, setPage] = useState('main');
            const [showIpImage, setShowIpImage] = useState(true);
            const [messageIndex, setMessageIndex] = useState(0);

            const messages = ["今天也要加油呀！", "暖暖的，每一天！", "你是最棒的！", "保持微笑，好运常在。", "心怀暖意，向光而行。"];
            const themes = ['pink', 'yellow', 'green', 'blue'];

            const toggleTheme = () => {
                const next = themes[(themes.indexOf(theme) + 1) % themes.length];
                setTheme(next);
                document.body.className = `theme-${next}`;
            };

            const isGreen = theme === 'green';

            // 图标组件模拟 (Lucide CDN 渲染)
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [page, theme, showIpImage]);

            const Icon = ({ name, size = 20, className = "" }) => (
                <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
            );

            return (
                <div className="phone-shell">
                    <div className="dynamic-island"></div>
                    <div className="screen no-scrollbar">
                        <AnimatePresence mode="wait">
                            {page === 'main' && (
                                <motion.div 
                                    key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    className="h-full overflow-y-auto no-scrollbar p-6 pt-12 space-y-6"
                                >
                                    {/* Header */}
                                    <header className="flex justify-between items-center">
                                        <div className="flex flex-col">
                                            <span className="text-2xl font-black italic tracking-tighter">ICBC <span className="brand-text">HAPPINESS</span></span>
                                            <span className="text-[8px] font-bold opacity-30 tracking-[0.3em] uppercase">Cloud Platform</span>
                                        </div>
                                        <button onClick={toggleTheme} className="w-10 h-10 rounded-full theme-bg-soft border theme-border flex items-center justify-center shadow-sm active:scale-90 transition-all">
                                            <div className="grid grid-cols-2 gap-0.5">
                                                <div className="w-1.5 h-1.5 rounded-full bg-[#FF8BA7]"></div>
                                                <div className="w-1.5 h-1.5 rounded-full bg-[#89CFF0]"></div>
                                                <div className="w-1.5 h-1.5 rounded-full bg-[#FFD700]"></div>
                                                <div className="w-1.5 h-1.5 rounded-full bg-[#E2FF54]"></div>
                                            </div>
                                        </button>
                                    </header>

                                    {/* IP Card */}
                                    <div className="relative h-48 w-full theme-bg-soft rounded-[40px] border theme-border overflow-hidden p-6 flex flex-col justify-between">
                                        <div className="flex-1 flex items-center justify-center">
                                            {showIpImage ? (
                                                <img src="https://raw.githubusercontent.com/Harrian-moo/design-assets/main/images/ip/%E4%B8%BB%E8%A7%86%E8%A7%89.png" className="h-32 object-contain" />
                                            ) : (
                                                <span className="text-xl font-bold brand-text italic text-center px-4">{messages[messageIndex]}</span>
                                            )}
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <div className="bg-white/50 backdrop-blur px-3 py-1.5 rounded-xl flex gap-3 text-[9px] font-bold">
                                                <button onClick={() => setShowIpImage(false)} className={!showIpImage ? "brand-text" : "opacity-30"}>HEART-LAB</button>
                                                <button onClick={() => setShowIpImage(true)} className={showIpImage ? "text-gray-800" : "opacity-30"}>SOUL MASTER</button>
                                            </div>
                                            <button className="w-10 h-10 brand-bg rounded-full flex items-center justify-center text-white shadow-lg">
                                                <Icon name="plus" size={18} />
                                            </button>
                                        </div>
                                    </div>

                                    {/* Grid Menu */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div onClick={() => setPage('energy')} className="h-32 p-4 rounded-[32px] theme-bg-soft border theme-border flex flex-col justify-between cursor-pointer active:scale-95 transition-all">
                                            <div className="w-8 h-8 bg-black/5 rounded-full flex items-center justify-center"><Icon name="activity" size={16}/></div>
                                            <span className="text-sm font-black">暖暖能量站</span>
                                        </div>
                                        <div onClick={() => setPage('healing')} className="h-32 p-4 rounded-[32px] brand-bg text-white flex flex-col justify-between shadow-lg cursor-pointer active:scale-95 transition-all">
                                            <div className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center"><Icon name="heart" size={16}/></div>
                                            <span className="text-sm font-black">暖暖疗愈所</span>
                                        </div>
                                        <div onClick={() => setPage('life')} className="h-28 p-4 rounded-[32px] theme-bg-soft border theme-border flex flex-col justify-between cursor-pointer active:scale-95 transition-all">
                                            <div className="w-8 h-8 bg-black/5 rounded-full flex items-center justify-center"><Icon name="coffee" size={16}/></div>
                                            <span className="text-sm font-black">暖心生活家</span>
                                        </div>
                                        <div onClick={() => setPage('learning')} className="h-28 p-4 rounded-[32px] bg-gray-100 flex flex-col justify-between cursor-pointer active:scale-95 transition-all">
                                            <div className="w-8 h-8 bg-black/5 rounded-full flex items-center justify-center"><Icon name="book-open" size={16}/></div>
                                            <span className="text-sm font-black">暖暖研学社</span>
                                        </div>
                                    </div>

                                    {/* Bottom Bar */}
                                    <div className="absolute bottom-8 left-6 right-6 h-20 bg-black rounded-full flex items-center px-3 justify-between shadow-2xl">
                                        <div className="flex items-center gap-3" onClick={() => setPage('admin')}>
                                            <div className="w-12 h-12 bg-white rounded-full border-2 border-[#FF8BA7] overflow-hidden">
                                                <img src="https://raw.githubusercontent.com/Harrian-moo/design-assets/main/images/ip/%E4%B8%BB%E8%A7%86%E8%A7%89.png" className="scale-150 translate-y-1" />
                                            </div>
                                            <div className="text-white">
                                                <p className="text-xs font-bold">暖暖</p>
                                                <p className="text-[7px] opacity-40 uppercase tracking-widest">Manager</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-white"><Icon name="send" size={16}/></button>
                                            <button className="px-4 h-12 brand-bg rounded-full text-[9px] font-black text-white uppercase tracking-widest">Profile</button>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {page === 'admin' && (
                                <motion.div 
                                    key="admin" initial={{ opacity: 0, x: 100 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -100 }}
                                    className="h-full bg-white p-6 pt-16 overflow-y-auto no-scrollbar"
                                >
                                    <div className="flex justify-between items-center mb-8">
                                        <button onClick={() => setPage('main')} className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><Icon name="arrow-left" size={16}/></button>
                                        <div className="text-right">
                                            <h2 className="text-lg font-bold">数据看板</h2>
                                            <p className="text-[8px] brand-text font-bold uppercase tracking-widest">Happiness Admin</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                                            <p className="text-[10px] opacity-40 mb-1">在线人数</p>
                                            <div className="flex items-end gap-1">
                                                <span className="text-xl font-bold">1,284</span>
                                                <span className="text-[8px] text-green-500 mb-1">+12%</span>
                                            </div>
                                            <div className="h-10 mt-2">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={[{v:10},{v:25},{v:15},{v:40},{v:30}]}>
                                                        <Line type="monotone" dataKey="v" stroke="#E60012" strokeWidth={2} dot={false} />
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                        <div className="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                                            <p className="text-[10px] opacity-40 mb-1">情绪指数</p>
                                            <div className="h-20">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <RadarChart data={[{s:'A',v:80},{s:'B',v:60},{s:'C',v:90},{s:'D',v:70}]}>
                                                        <PolarGrid stroke="#eee" />
                                                        <Radar dataKey="v" stroke="#E60012" fill="#E60012" fillOpacity={0.5} />
                                                    </RadarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-6 rounded-3xl border border-gray-100 mb-6">
                                        <p className="text-[10px] opacity-40 uppercase mb-4">满意度趋势</p>
                                        <div className="h-32">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={[{n:'1',v:60},{n:'2',v:80},{n:'3',v:70},{n:'4',v:95}]}>
                                                    <Bar dataKey="v" fill="#E60012" radius={[4,4,0,0]} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                                        <p className="text-[10px] opacity-40 uppercase mb-4">设备全景</p>
                                        <div className="aspect-video bg-white rounded-2xl border border-gray-200 relative flex items-center justify-center">
                                            <div className="w-4 h-4 brand-bg rounded-full animate-ping"></div>
                                            <Icon name="map" className="absolute top-2 right-2 opacity-10" />
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* 其他页面 (Energy, Healing 等) 可以在此继续添加 AnimatePresence 逻辑 */}
                            {['energy', 'healing', 'life', 'learning', 'baby'].includes(page) && (
                                <motion.div 
                                    key="subpage" initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 50 }}
                                    className="h-full bg-white p-8 pt-16 overflow-y-auto no-scrollbar"
                                >
                                    <button onClick={() => setPage('main')} className="mb-8 w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><Icon name="arrow-left" size={16}/></button>
                                    <h2 className="text-3xl font-serif italic mb-2">
                                        {page === 'energy' && "暖暖能量站"}
                                        {page === 'healing' && "暖暖疗愈所"}
                                        {page === 'life' && "暖心生活家"}
                                        {page === 'learning' && "暖暖研学社"}
                                        {page === 'baby' && "暖暖宝贝屋"}
                                    </h2>
                                    <p className="text-[10px] font-bold brand-text uppercase tracking-widest mb-8">Happiness Cloud Platform</p>
                                    
                                    <div className="space-y-4">
                                        {[1,2,3].map(i => (
                                            <div key={i} className="p-6 rounded-[32px] bg-gray-50 border border-gray-100 flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm"><Icon name="star" className="brand-text" /></div>
                                                <div>
                                                    <p className="font-bold text-sm">推荐内容 {i}</p>
                                                    <p className="text-[10px] opacity-40">为您精心挑选的幸福资讯</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
